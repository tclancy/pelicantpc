name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Lint (ruff)
        run: uv run ruff check plugins/ tests/ *.py
      - name: Format check (ruff)
        run: uv run ruff format --check plugins/ tests/ *.py
      - name: Run tests
        run: uv run pytest
