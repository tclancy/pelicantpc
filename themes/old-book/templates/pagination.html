{% if articles_page %}
<div class="pagination">
    {% if articles_page.has_previous() %}
    <a href="{{ SITEURL }}/{{ articles_previous_page.save_as }}">&lsaquo; Newer</a>
    {% endif %}

    <span class="current">
        {{ articles_page.number }} of {{ articles_paginator.num_pages }}
    </span>

    {% if articles_page.has_next() %}
    <a href="{{ SITEURL }}/{{ articles_next_page.save_as }}">Older &rsaquo;</a>
    {% endif %}
</div>
{% endif %}
