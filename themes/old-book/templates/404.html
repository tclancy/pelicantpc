{% extends "base.html" %}
{% block title %}Page Not Found &mdash; {{ SITENAME }}{% endblock %}
{% block content %}
<div style="text-align:center;padding:4rem 0;">
    <div class="ornament">❦ &nbsp; ❧</div>
