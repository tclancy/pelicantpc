<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <filter id="speedBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" edgeMode="duplicate" />
    </filter>

    <filter id="textDepth" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="12" dy="12" stdDeviation="2" flood-color="#000000" flood-opacity="0.9"/>
    </filter>

    <linearGradient id="sunsetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF9D2"/> <stop offset="25%" stop-color="#FFD600"/> <stop offset="50%" stop-color="#FF6A00"/> <stop offset="80%" stop-color="#B20000"/> <stop offset="100%" stop-color="#2a0c00"/> </linearGradient>

    <radialGradient id="intenseBurn" cx="10%" cy="10%" r="100%" fx="10%" fy="10%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="10%" stop-color="#FFD600" stop-opacity="0.95" />
      <stop offset="30%" stop-color="#ff6a00" stop-opacity="0.6" />
      <stop offset="65%" stop-color="#4A0000" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>

    <style>
      .retro-text {
        font-family: 'Impact', 'Arial Black', sans-serif;
        font-size: 150px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -2px;
        fill: url(#sunsetGrad);
        stroke: #ffffff;
        stroke-width: 4px;
        stroke-linejoin: round;
        filter: url(#textDepth);
      }

      /* Inner highlight line inside text */
      .inner-line {
        font-family: 'Impact', 'Arial Black', sans-serif;
        font-size: 150px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -2px;
        fill: none;
        stroke: #4A0000;
        stroke-width: 2px;
        stroke-linejoin: round;
        opacity: 0.8;
      }

      /* Extreme Overexposure Burn Layer */
      .burn-layer {
        font-family: 'Impact', 'Arial Black', sans-serif;
        font-size: 150px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -2px;
        fill: url(#intenseBurn);
        mix-blend-mode: color-dodge; /* Essential for 'burn' look */
      }
    </style>
  </defs>

  <g transform="translate(500, 150)" filter="url(#speedBlur)" opacity="0.65">
    <circle cx="0" cy="0" r="140" fill="none" stroke="#FF6A00" stroke-width="20" />
    <circle cx="0" cy="0" r="110" fill="none" stroke="#FFD600" stroke-width="6" />

    <line x1="-300" y1="0" x2="300" y2="0" stroke="#FF6A00" stroke-width="6" />
    <line x1="-300" y1="15" x2="300" y2="15" stroke="#FFD600" stroke-width="3" />
    <line x1="-300" y1="-15" x2="300" y2="-15" stroke="#FFD600" stroke-width="3" />
  </g>

  <g transform="translate(500, 200) skewX(-12)">
    <text x="0" y="0" text-anchor="middle" class="retro-text">TOM CLANCY</text>
    <text x="0" y="0" text-anchor="middle" class="inner-line">TOM CLANCY</text>
    <text x="0" y="0" text-anchor="middle" class="burn-layer">TOM CLANCY</text>
  </g>
</svg>
