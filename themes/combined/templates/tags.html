{% extends "base.html" %}

{% block title %}All Tags &mdash; {{ SITENAME }}{% endblock %}

{% block content %}
<main class="main-content">
    <div class="content-grid">
        <div class="primary-column">
            <div class="archive-header">
                <h1 class="archive-title">All Tags</h1>
            </div>
            <div class="tags-cloud">
                {% for tag, articles in tags | sort %}
                <a href="{{ SITEURL }}/{{ tag.url }}" class="tag tag--cloud" data-count="{{ articles | count }}">
                    {{ tag }} <span class="tag-count">({{ articles | count }})</span>
                </a>
                {% endfor %}
            </div>
        </div>

        <aside class="sidebar">
            {% include 'sidebar.html' %}
        </aside>
    </div>
</main>
{% endblock %}
